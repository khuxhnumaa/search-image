name: texttoimage
description: "Offline phone gallery text-to-image search using CLIP (on-device)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  photo_manager: ^3.6.3
  tflite_flutter: ^0.11.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/models/
    - assets/tokenizer/
